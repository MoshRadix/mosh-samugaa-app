<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>📄 Document Generator</h1>
            <nav class="main-nav">
                <button class="nav-btn active" data-view="templates">Templates</button>
                <button class="nav-btn" data-view="fill-form">Fill Form</button>
                <button class="nav-btn" data-view="search">Search & Print</button>
            </nav>
        </header>

        <main class="main-content">
            <!-- Templates View -->
            <div id="templates-view" class="view active">
                <div class="view-header">
                    <h2>Templates Library</h2>
                    <button id="add-template-btn" class="btn btn-primary" >+ New Template</button>
                </div>
                <div class="template-filters">
                    <input type="text" id="template-search" placeholder="Search templates..." class="search-input">
                    <select id="type-filter" class="filter-select">
                        <option value="all">All Types</option>
                        <option value="word">Word Documents</option>
                        <option value="excel">Excel Spreadsheets</option>
                    </select>
                    <select id="fillable-filter" class="filter-select">
                        <option value="all">All Templates</option>
                        <option value="fillable">Fillable</option>
                        <option value="static">Static</option>
                    </select>
                </div>
                <div id="templates-grid" class="templates-grid">
                    <!-- Templates will be rendered here -->
                </div>
            </div>

            <!-- Fill Form View -->
            <div id="fill-form-view" class="view">
                <div class="view-header">
                    <h2>Fill Template Form</h2>
                    <button id="back-to-templates-btn" class="btn btn-secondary">← Back to Templates</button>
                </div>
                <div id="form-container">
                    <!-- Form will be rendered here -->
                </div>
            </div>

            <!-- Search & Print View -->
            <div id="search-view" class="view">
                <div class="view-header">
                    <h2>Search & Print Documents</h2>
                </div>
                <div class="search-filters">
                    <input type="text" id="document-search" placeholder="Search by name, category, or description..." class="search-input">
                    <select id="search-type-filter" class="filter-select">
                        <option value="all">All Types</option>
                        <option value="word">Word Documents</option>
                        <option value="excel">Excel Spreadsheets</option>
                    </select>
                    <select id="search-fillable-filter" class="filter-select">
                        <option value="all">All Documents</option>
                        <option value="static">Static Documents Only</option>
                        <option value="fillable">Fillable Documents</option>
                    </select>
                </div>
                <div id="search-results" class="search-results">
                    <!-- Search results will be rendered here -->
                </div>
            </div>
        </main>

        <!-- Modal for Template Details -->
        <div id="template-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modal-title">Template Details</h2>
                <div id="modal-body">
                    <!-- Modal content will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Modal for Field Configuration -->
        <div id="fields-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Configure Template Fields</h2>
                <div id="fields-modal-body">
                    <!-- Fields configuration will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="templates.js"></script>
    <script src="fields.js"></script>
    <script src="form.js"></script>
    <script src="search.js"></script>
    <script src="app.js"></script>
</body>
</html>
